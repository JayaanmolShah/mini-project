<div class="my-3">
  <h4>Add a To-Do</h4>
  <form #todoForm="ngForm" (ngSubmit)="Onsubmit(todoForm)">
    <div class="mb-3">
      <label for="title" class="form-label">Enter the title.</label>
      <input type="text" class="form-control" id="title" name="title" [(ngModel)]="title" required #titleRef="ngModel">
      <div *ngIf="titleRef.invalid && titleRef.touched" class="text-danger">
        Title is required
      </div>
    </div>
    <div class="mb-3">
      <label for="desc" class="form-label">Enter the description.</label>
      <input type="text" class="form-control" id="desc" name="desc" [(ngModel)]="desc">
    </div>

    <button type="submit" class="btn btn-sm btn-primary">Add.</button>
  </form>
</div>
